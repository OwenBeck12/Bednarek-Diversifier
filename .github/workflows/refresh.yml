name: Daily Stock Data Refresh

on:
  schedule:
    # 5:30 PM Eastern (10:30 PM UTC) Mon–Fri — after market close, data is settled
    - cron: '30 22 * * 1-5'
  workflow_dispatch:   # allows you to trigger it manually from GitHub's UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated stocks.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas numpy lxml requests

      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: data/prices_cache.pkl
          key: prices-${{ runner.os }}-${{ hashFiles('fetch_data.py') }}
          restore-keys: prices-${{ runner.os }}-

      - name: Run data fetcher
        run: python fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json data/marketcap_cache.json
          git diff --staged --quiet || git commit -m "Data refresh $(date -u '+%Y-%m-%d')"
          git push
